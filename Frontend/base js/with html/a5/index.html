<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Diárias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cálculo de Diárias</h1>
        
        <form id="formDiarias">
            <div class="form-group">
                <label for="numeroDiarias">Número de Diárias Trabalhadas:</label>
                <input type="number" id="numeroDiarias" name="numeroDiarias" min="0" step="1" placeholder="Ex: 10" required>
            </div>

            <div class="form-group">
                <label for="valorDiaria">Valor Cobrado por Diária (R$):</label>
                <input type="number" id="valorDiaria" name="valorDiaria" min="0" step="0.01" placeholder="Ex: 100.00" required>
            </div>

            <button type="submit" class="btn-calcular">Calcular</button>
        </form>

        <div id="resultado" class="resultado oculto">
            <h2>Resultado</h2>
            <div class="resultado-conteudo">
                <p>
                    <strong>Total a Receber:</strong>
                    <span id="exibicaoTotal">R$ 0,00</span>
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
