<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"
        defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="calculator">
            <h1>Calculadora</h1>
            <input type="text" class="display" id="display">

            <div class="row">
                <div class="row">
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary num" id="btn7">7</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary num" id="btn8">8</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary num" id="btn9">9</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary operator" id="btnDivisao">/</button></div>

                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary num" id="btn4">4</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary num" id="btn5">5</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary num" id="btn6">6</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary operator" id="btnMultiplicacao">*</button></div>

                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary num" id="btn1">1</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary num" id="btn2">2</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary num" id="btn3">3</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary operator" id="btnSubtracao">-</button></div>

                    <div class="col-6 mb-2"><button class="btn btn-outline-secondary num" id="btn0">0</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary" id="btnEqual">=</button></div>
                    <div class="col-3 mb-2"><button class="btn btn-outline-secondary operator" id="btnSoma">+</button></div>

                </div>
            </div>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
